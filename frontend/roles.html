<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>角色管理 - 珠宝OA</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="roles">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">珠宝 OA</div><div class="menu-title">菜单管理</div><div id="dynamicMenu"></div>
        <div class="menu-title">当前用户</div><div id="currentUser" class="menu-item" style="background:#1f2937"></div>
        <button id="btnLogout" class="menu-item" style="width:calc(100% - 8px);text-align:left;">退出登录</button>
      </aside>
      <main class="main">
        <header class="hero"><h1>角色管理</h1><p>管理角色信息及其菜单权限、功能权限。</p></header>
        <section class="panel">
          <input id="rId" type="hidden" />
          <div class="grid-4">
            <input id="rCode" placeholder="角色编码" />
            <input id="rName" placeholder="角色名称" />
            <input id="rRemark" placeholder="备注" />
          </div>
          <div class="mt8 section-stack"><div class="hint">权限勾选</div><div id="permChecks"></div></div>
          <div class="mt8 section-stack"><div class="hint">菜单勾选</div><div id="menuChecks"></div></div>
          <div class="row mt8"><button id="btnSaveRole">保存</button><button id="btnResetRole" class="btn-secondary">清空</button><span id="rMsg" class="hint"></span></div>
        </section>
        <section class="panel">
          <div class="table-wrap"><table><thead><tr><th>ID</th><th>编码</th><th>名称</th><th>备注</th><th>操作</th></tr></thead><tbody id="roleRows"></tbody></table></div>
        </section>
      </main>
    </div>
    <script src="/common.js"></script><script src="/nav.js"></script><script src="/roles.js"></script>
  </body>
</html>
