<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>权限管理 - 珠宝OA</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="permissions">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">珠宝 OA</div><div class="menu-title">菜单管理</div><div id="dynamicMenu"></div>
        <div class="menu-title">当前用户</div><div id="currentUser" class="menu-item" style="background:#1f2937"></div>
        <button id="btnLogout" class="menu-item" style="width:calc(100% - 8px);text-align:left;">退出登录</button>
      </aside>
      <main class="main">
        <header class="hero"><h1>权限管理</h1><p>维护权限点定义（功能编码）。</p></header>
        <section class="panel">
          <input id="pId" type="hidden" />
          <div class="grid-4">
            <input id="pCode" placeholder="权限编码" />
            <input id="pName" placeholder="权限名称" />
            <input id="pRemark" placeholder="备注" />
          </div>
          <div class="row mt8"><button id="btnSavePerm">保存</button><button id="btnResetPerm" class="btn-secondary">清空</button><span id="pMsg" class="hint"></span></div>
        </section>
        <section class="panel">
          <div class="table-wrap"><table><thead><tr><th>ID</th><th>编码</th><th>名称</th><th>备注</th><th>操作</th></tr></thead><tbody id="permRows"></tbody></table></div>
        </section>
      </main>
    </div>
    <script src="/common.js"></script><script src="/nav.js"></script><script src="/permissions.js"></script>
  </body>
</html>
