<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>主页 - 珠宝OA</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="home">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">珠宝 OA</div>
        <div class="menu-title">菜单管理</div>
        <div id="dynamicMenu"></div>
        <div class="menu-title">当前用户</div>
        <div id="currentUser" class="menu-item" style="background:#1f2937"></div>
        <button id="btnLogout" class="menu-item" style="width:calc(100% - 8px);text-align:left;">退出登录</button>
      </aside>

      <main class="main">
        <header class="hero">
          <h1>系统主页</h1>
          <p>常规业务总览界面，可快速查看产品数据规模和最近更新。</p>
        </header>

        <section class="panel">
          <div class="kpi-grid">
            <div class="kpi"><div class="label">产品总数</div><div class="value" id="kpiProducts">-</div></div>
            <div class="kpi"><div class="label">工厂数量</div><div class="value" id="kpiFactories">-</div></div>
            <div class="kpi"><div class="label">产品类型数量</div><div class="value" id="kpiTypes">-</div></div>
          </div>
        </section>

        <section class="panel">
          <h2>类型分布</h2>
          <div class="table-wrap"><table><thead><tr><th>产品类型</th><th>数量</th></tr></thead><tbody id="typeRows"></tbody></table></div>
        </section>

        <section class="panel">
          <h2>最近更新</h2>
          <div class="table-wrap"><table><thead><tr><th>产品编号</th><th>产品类型</th><th>更新时间</th></tr></thead><tbody id="recentRows"></tbody></table></div>
        </section>
      </main>
    </div>
    <script src="/common.js"></script>
    <script src="/nav.js"></script>
    <script src="/home.js"></script>
  </body>
</html>
